<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP App — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700;1,900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ════════════════════════════════════
     LOGIN SCREEN
════════════════════════════════════ -->
<div id="screen-login" class="screen auth-screen active">
  <div class="auth-left">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="logo">J<span>P</span></div>
  </div>
  <div class="auth-right">
    <div class="auth-title">Welcome!<br>Log In</div>
    <div class="auth-form" id="login-form">
      <input class="auth-input" id="login-email" type="email" placeholder="Enter Email">
      <div class="input-wrap">
        <input class="auth-input" id="login-password" type="password" placeholder="Enter Password">
      </div>
      <div class="forgot-link" onclick="goTo('screen-forgot')">Forgot Password?</div>
      <button class="btn-primary" onclick="doLogin()">Log In</button>
      <div class="auth-alt-link">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════
     FORGOT PASSWORD SCREEN
════════════════════════════════════ -->
<div id="screen-forgot" class="screen auth-screen">
  <div class="auth-left">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="logo">J<span>P</span></div>
  </div>
  <div class="auth-right">
    <div class="auth-title">Forgot<br>Password</div>
    <div class="auth-form">
      <div class="input-wrap">
        <input class="auth-input" id="forgot-email" type="email" placeholder="Enter Email" style="padding-right:52px">
        <button class="inline-btn" onclick="sendVerify()">&#8594;</button>
      </div>
      <input class="auth-input" id="forgot-pass" type="password" placeholder="Enter Password">
      <button class="btn-primary" onclick="goTo('screen-newpass')">Verify</button>
      <div class="back-link" onclick="goTo('screen-login')">&#8592; <span>Back to Login</span></div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════
     CREATE NEW PASSWORD SCREEN
════════════════════════════════════ -->
<div id="screen-newpass" class="screen auth-screen">
  <div class="auth-left">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="logo">J<span>P</span></div>
  </div>
  <div class="auth-right">
    <div class="auth-title">Create<br>New Pass</div>
    <div class="auth-form">
      <input class="auth-input" id="new-pass" type="password" placeholder="New Password">
      <input class="auth-input" id="confirm-pass" type="password" placeholder="Confirm Password">
      <button class="btn-primary" onclick="doChangePassword()">Change Password</button>
      <div class="back-link" onclick="goTo('screen-login')">&#8592; <span>Back to Login</span></div>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<script src="js/auth.js"></script>
</body>
</html>
