<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP | Sales</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700;1,900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/sales.css">
</head>
<body class="page-scroll">

<!-- ════════════════════════════════════
     SHARED NAVIGATION BAR
════════════════════════════════════ -->
<nav class="shared-nav">
  <div class="shared-nav-top">
    <a href="dashboard.html" class="shared-nav-link">Dashboard</a>
    <div class="shared-nav-logo">J<span>P</span></div>
    <div class="shared-nav-right">
      <span class="shared-nav-user" id="nav-user">Welcome</span>
      <button class="shared-nav-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
</nav>

<!-- ════════════════════════════════════
     SALES CONTENT
════════════════════════════════════ -->
<main class="inv-main">

  <!-- Page Navigation -->
  <div class="page-nav">
    <a href="inventory.html" class="page-nav-link">Inventory</a>
    <span class="page-nav-div">/</span>
    <a href="sales.html" class="page-nav-link active">Sales</a>
    <span class="page-nav-div">/</span>
    <a href="expenses.html" class="page-nav-link">Expenses</a>
  </div>

  <!-- Batch Sidebar + Sales View -->
  <div class="inv-body">
    <div class="batch-sidebar" id="sales-batch-sidebar">
      <!-- Batch pills injected by JS -->
    </div>
    <div class="batch-main">
      <div class="placeholder-msg" id="sales-placeholder">Select a batch to<br>view sales.</div>

      <!-- Sales Overview (hidden until batch selected) -->
      <div class="sales-overview" id="sales-overview">
        <div class="sales-overview-title" id="sales-overview-title">SALES OVERVIEW</div>
        <div class="sales-total" id="sales-total">Total Sales (Calculated): ₱0</div>
        <div class="sales-table-wrap">
          <table class="sales-table">
            <thead>
              <tr>
                <th>Product</th><th>GB</th><th>Qty</th><th>Customer</th>
                <th>Payment</th><th>Delivery</th><th>Sold By</th>
                <th>Receipt #</th><th>Amount</th><th>Encashed</th>
                <th>In Stock</th><th>Date Sold</th><th>Edit</th>
              </tr>
            </thead>
            <tbody id="sales-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal Overlay ── -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeSaleModal();closeEditSaleModal()"></div>

  <!-- ── Add Sale Modal ── -->
  <div class="modal modal-wide" id="modal-add-sale">
    <div class="modal-title">Add New Sale</div>
    <div class="modal-body">

      <select class="form-select modal-input" id="sale-unit">
        <option value="">Select Unit From Stock</option>
      </select>

      <select class="form-select modal-input" id="sale-gb">
        <option value="">Select GB</option>
        <option value="64GB">64 GB</option>
        <option value="128GB">128 GB</option>
        <option value="256GB">256 GB</option>
        <option value="512GB">512 GB</option>
        <option value="1TB">1 TB</option>
      </select>

      <select class="form-select modal-input" id="sale-soldby">
        <option value="">Sold by</option>
        <option value="JP Store">JP Store</option>
        <option value="John">John</option>
        <option value="Maria">Maria</option>
        <option value="Alex">Alex</option>
        <option value="Online Team">Online Team</option>
      </select>

      <input class="form-input modal-input" id="sale-qty" type="number" min="1" value="1" placeholder="Quantity:">

      <select class="form-select modal-input" id="sale-payment">
        <option value="">Select Mode of Payment</option>
        <option value="GCash">GCash</option>
        <option value="Maya">Maya</option>
        <option value="Bank Transfer">Bank Transfer</option>
        <option value="COD">Cash on Delivery (COD)</option>
        <option value="Cash Meetup">Cash (Meetup/Pickup)</option>
      </select>

      <select class="form-select modal-input" id="sale-delivery" onchange="toggleReceiptField()">
        <option value="">Mode of Delivery</option>
        <option value="Lalamove">Lalamove</option>
        <option value="Grab">Grab</option>
        <option value="LBC">LBC</option>
        <option value="J&T">J&amp;T</option>
        <option value="Meetup">Meetup</option>
        <option value="Pickup">Pickup</option>
      </select>

      <input class="form-input modal-input" id="sale-customer" placeholder="Enter Name of Customer:">

      <div id="receipt-group" style="display:none">
        <input class="form-input modal-input" id="sale-receipt" placeholder="Receipt Number: (Optional)">
      </div>

      <label class="modal-check">
        <input type="checkbox" id="sale-encashed">
        <span>Mark as Encashed</span>
      </label>

    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSaleModal()">Cancel</button>
      <button class="btn-save" onclick="saveSale()">Save Sale Item</button>
    </div>
  </div>

  <!-- ── Edit Sale Modal ── -->
  <div class="modal modal-wide" id="modal-edit-sale">
    <div class="modal-title">Edit Sale</div>
    <div class="modal-body">
      <input type="hidden" id="edit-sale-id">

      <input class="form-input modal-input" id="edit-sale-unit" disabled placeholder="Name of the Unit">
      <input class="form-input modal-input" id="edit-sale-gb" disabled placeholder="GB of the Unit">

      <select class="form-select modal-input" id="edit-sale-soldby">
        <option value="">Sold by</option>
        <option value="JP Store">JP Store</option>
        <option value="John">John</option>
        <option value="Maria">Maria</option>
        <option value="Alex">Alex</option>
        <option value="Online Team">Online Team</option>
      </select>

      <input class="form-input modal-input" id="edit-sale-qty" type="number" min="1" placeholder="Quantity:">

      <select class="form-select modal-input" id="edit-sale-payment">
        <option value="">Select Mode of Payment</option>
        <option value="GCash">GCash</option>
        <option value="Maya">Maya</option>
        <option value="Bank Transfer">Bank Transfer</option>
        <option value="COD">Cash on Delivery (COD)</option>
        <option value="Cash Meetup">Cash (Meetup/Pickup)</option>
      </select>

      <select class="form-select modal-input" id="edit-sale-delivery" onchange="toggleEditReceiptField()">
        <option value="">Mode of Delivery</option>
        <option value="Lalamove">Lalamove</option>
        <option value="Grab">Grab</option>
        <option value="LBC">LBC</option>
        <option value="J&T">J&amp;T</option>
        <option value="Meetup">Meetup</option>
        <option value="Pickup">Pickup</option>
      </select>

      <input class="form-input modal-input" id="edit-sale-customer" placeholder="Enter Name of Customer:">

      <div id="edit-receipt-group" style="display:none">
        <input class="form-input modal-input" id="edit-sale-receipt" placeholder="Receipt Number: (Optional)">
      </div>

      <input class="form-input modal-input" id="edit-sale-amount" disabled placeholder="Amount:">

      <label class="modal-check">
        <input type="checkbox" id="edit-sale-encashed">
        <span>Mark as Encashed</span>
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditSaleModal()">Cancel</button>
      <button class="btn-save" onclick="saveEditSale()">Update Sale</button>
    </div>
  </div>

</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/common.js"></script>
<script src="js/api.js"></script>
<script src="js/sales.js"></script>
</body>
</html>
