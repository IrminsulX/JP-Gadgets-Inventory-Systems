<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP App — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700;1,900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ════════════════════════════════════
     SIGN UP SCREEN
════════════════════════════════════ -->
<div id="screen-signup" class="screen auth-page active">

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>

  <div class="auth-card-wrap">
    <div class="logo">J<span>P</span></div>
    <div class="auth-card">
      <div class="auth-title">Create Account</div>
      <p class="auth-subtitle">Join JP Inventory today</p>
      <div class="auth-form" id="signup-form">
        <input class="auth-input" id="signup-name" type="text" placeholder="Full name" autocomplete="name">
        <input class="auth-input" id="signup-email" type="email" placeholder="Email address" autocomplete="email">
        <div class="input-wrap">
          <input class="auth-input" id="signup-password" type="password" placeholder="Password" autocomplete="new-password">
        </div>
        <input class="auth-input" id="signup-confirm" type="password" placeholder="Confirm password" autocomplete="new-password">
        <button class="btn-primary" onclick="doSignup()">Sign Up</button>
        <div class="auth-alt-link">
          Already have an account? <a href="login.html">Log in</a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<script src="js/auth.js"></script>
</body>
</html>
