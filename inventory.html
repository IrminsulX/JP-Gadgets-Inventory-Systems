<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP | Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700;1,900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/inventory.css">
</head>
<body class="page-scroll">

<!-- ════════════════════════════════════
     SHARED NAVIGATION BAR
════════════════════════════════════ -->
<nav class="shared-nav">
  <div class="shared-nav-top">
    <a href="dashboard.html" class="shared-nav-link">Dashboard</a>
    <div class="shared-nav-logo">J<span>P</span></div>
    <div class="shared-nav-right">
      <span class="shared-nav-user" id="nav-user">Welcome</span>
      <button class="shared-nav-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
</nav>

<!-- ════════════════════════════════════
     INVENTORY CONTENT
════════════════════════════════════ -->
<main class="inv-main">

  <!-- Page Navigation -->
  <div class="page-nav">
    <a href="inventory.html" class="page-nav-link active">Inventory</a>
    <span class="page-nav-div">/</span>
    <a href="sales.html" class="page-nav-link">Sales</a>
    <span class="page-nav-div">/</span>
    <a href="expenses.html" class="page-nav-link">Expenses</a>
  </div>

  <div class="inv-body">
  <div class="batch-sidebar" id="batch-sidebar">
    <!-- Batch pills injected by JS -->
  </div>
  <div class="batch-main">
    <!-- Placeholder -->
    <div class="placeholder-msg" id="inventory-placeholder">
      Select batch to<br>view inventory.
    </div>
    <!-- Batch Items View -->
    <div class="batch-view" id="batch-view">
      <div class="batch-view-title" id="batch-view-title"></div>
      <div class="items-grid" id="batch-items-grid">
        <!-- Item cards injected by JS -->
      </div>
    </div>
  </div>
  </div><!-- /inv-body -->

  <!-- ── Batch Actions Dropdown ── -->
  <div class="batch-actions-dropdown" id="batch-actions-dropdown">
    <button class="action-opt" onclick="showEditBatchModal()">Edit Batch</button>
    <button class="action-opt" onclick="showAddUnitModal()">Add New Unit</button>
    <button class="action-opt action-opt-danger" onclick="showDeleteBatchModal()">Delete Batch</button>
  </div>

  <!-- ── Modal Overlay ── -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>

  <!-- ── Edit Batch Modal ── -->
  <div class="modal" id="modal-edit-batch">
    <div class="modal-title">Edit Batch</div>
    <div class="modal-body">
      <input class="form-input modal-input" id="edit-batch-name" placeholder="Change Batch Name:">
      <input class="form-input modal-input" id="edit-batch-date" type="date" placeholder="Change Batch Date">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEditBatch()">Save</button>
    </div>
  </div>

  <!-- ── Add New Unit Modal ── -->
  <div class="modal" id="modal-add-unit">
    <div class="modal-title">Add New Unit</div>
    <div class="modal-body">
      <input class="form-input modal-input" id="unit-type" placeholder="Input Unit Type:">
      <select class="form-select modal-input" id="unit-gb">
        <option value="">Choose Gigabyte options:</option>
        <option value="64GB">64 GB</option>
        <option value="128GB">128 GB</option>
        <option value="256GB">256 GB</option>
        <option value="512GB">512 GB</option>
        <option value="1TB">1 TB</option>
      </select>
      <input class="form-input modal-input" id="unit-image-url" placeholder="Image Unit URL">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveAddUnit()">Add Unit</button>
    </div>
  </div>

  <!-- ── Add New Batch Modal ── -->
  <div class="modal" id="modal-add-batch">
    <div class="modal-title">Add New Batch</div>
    <div class="modal-body">
      <input class="form-input modal-input" id="batch-name-input" placeholder="Enter Batch Name:">
      <input class="form-input modal-input" id="batch-date-input" type="date">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveBatch()">Save</button>
    </div>
  </div>

  <!-- ── Delete Batch Modal ── -->
  <div class="modal" id="modal-delete-batch">
    <div class="modal-title">Delete Batch</div>
    <div class="modal-body">
      <p class="modal-text">Do you want to Delete this batch?</p>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-delete" onclick="deleteBatch()">Delete</button>
    </div>
  </div>

  <!-- ── Item Detail Modal ── -->
  <div class="modal modal-wide" id="modal-item-detail">
    <div class="modal-title" id="item-detail-title">Unit Details</div>

    <!-- Sub-tabs -->
    <div class="item-tabs">
      <button class="item-tab active" onclick="switchItemTab('price')">Set Price</button>
      <button class="item-tab" onclick="switchItemTab('stock')">Set Stock</button>
      <button class="item-tab" onclick="switchItemTab('repair')">View Repair</button>
      <button class="item-tab item-tab-danger" onclick="switchItemTab('delete')">Delete Unit</button>
    </div>

    <!-- Panel: Set Price -->
    <div class="item-panel active" id="item-panel-price">
      <div class="item-panel-body">
        <input class="form-input modal-input" id="item-orig-price" placeholder="Set Original Price:">
        <input class="form-input modal-input" id="item-sell-price" placeholder="Set Selling Price:">
        <button class="btn-save" onclick="saveItemPricing()">Save Pricing</button>
      </div>
    </div>

    <!-- Panel: Set Stock -->
    <div class="item-panel" id="item-panel-stock">
      <div class="item-panel-body">
        <input class="form-input modal-input" id="item-stock-num" type="number" placeholder="Set Total Stock Number:">
        <button class="btn-save" onclick="saveItemStock()">Save Stock #</button>
      </div>
    </div>

    <!-- Panel: View Repair -->
    <div class="item-panel" id="item-panel-repair">
      <div class="item-panel-body">
        <table class="repair-table">
          <thead>
            <tr><th>#</th><th>Type of Repair</th><th>Repair Cost</th></tr>
          </thead>
          <tbody id="repair-tbody"></tbody>
        </table>
        <button class="btn-save" onclick="createRepair()" style="margin-top:12px">+ CREATE NEW</button>
      </div>
    </div>

    <!-- Panel: Delete Unit -->
    <div class="item-panel" id="item-panel-delete">
      <div class="item-panel-body">
        <p class="modal-text" id="item-delete-msg">Are you sure you want to delete this unit?</p>
        <p style="font-size:12px;color:var(--muted);margin-top:-6px">This action cannot be undone.</p>
      </div>
      <div class="modal-actions" style="margin-top:8px">
        <button class="btn-cancel" onclick="switchItemTab('price')">Cancel</button>
        <button class="btn-delete" onclick="confirmDeleteItem()">Confirm Delete</button>
      </div>
    </div>

    <!-- Always-visible Cancel -->
    <div class="modal-actions" style="border-top:1px solid rgba(139,106,62,0.2);padding-top:10px;margin-top:4px">
      <button class="btn-cancel" onclick="closeItemModal()">Cancel Action</button>
    </div>
  </div>

</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/common.js"></script>
<script src="js/api.js"></script>
<script src="js/inventory.js"></script>
</body>
</html>
