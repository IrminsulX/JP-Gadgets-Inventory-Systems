<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP | Expenses</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700;1,900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/inventory.css">
<link rel="stylesheet" href="css/expenses.css">
</head>
<body class="page-scroll">

<!-- ════════════════════════════════════
     SHARED NAVIGATION BAR
════════════════════════════════════ -->
<nav class="shared-nav">
  <div class="shared-nav-top">
    <a href="dashboard.html" class="shared-nav-link">Dashboard</a>
    <div class="shared-nav-logo">J<span>P</span></div>
    <div class="shared-nav-right">
      <span class="shared-nav-user" id="nav-user">Welcome</span>
      <button class="shared-nav-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
</nav>

<!-- ════════════════════════════════════
     EXPENSES CONTENT
════════════════════════════════════ -->
<main class="inv-main">

  <!-- Page Navigation -->
  <div class="page-nav">
    <a href="inventory.html" class="page-nav-link">Inventory</a>
    <span class="page-nav-div">/</span>
    <a href="sales.html" class="page-nav-link">Sales</a>
    <span class="page-nav-div">/</span>
    <a href="expenses.html" class="page-nav-link active">Expenses</a>
  </div>

  <div class="inv-body">
    <div class="batch-sidebar" id="expense-batch-sidebar">
      <!-- Expense batch pills injected by JS -->
    </div>
    <div class="batch-main">
      <!-- Placeholder -->
      <div class="placeholder-msg" id="expense-placeholder">
        Select batch to<br>view expenses.
      </div>
      <!-- Expense Items View -->
      <div class="batch-view" id="expense-batch-view">
        <div class="batch-view-title" id="expense-batch-view-title"></div>
        <div class="expense-list" id="expense-items-list">
          <!-- Expense rows injected by JS -->
        </div>
      </div>
    </div>
  </div><!-- /inv-body -->

  <!-- ── Modal Overlay ── -->
  <div class="modal-overlay" id="expense-modal-overlay" onclick="closeExpenseModal()"></div>

  <!-- ── Add New Expenses Modal ── -->
  <div class="modal" id="modal-add-expense">
    <div class="modal-title">Add New Expenses</div>
    <div class="modal-body">
      <div class="modal-field">
        <label class="modal-label">Select Category</label>
        <select class="form-select modal-input" id="expense-category">
          <option value="">Select Category</option>
          <option>Office Supplies</option>
          <option>Shipping Fees</option>
          <option>Utilities (Internet/Electricity)</option>
          <option>Food/Meals</option>
          <option>Transportation</option>
          <option>Marketing/Ads</option>
          <option>Employee Salary</option>
          <option>Other</option>
        </select>
      </div>
      <div class="modal-field">
        <label class="modal-label">Enter Amount (PHP):</label>
        <input class="form-input modal-input" id="expense-amount" type="number" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="modal-field">
        <label class="modal-label">Enter Description:</label>
        <input class="form-input modal-input" id="expense-desc" placeholder="Description">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeExpenseModal()">Cancel</button>
      <button class="btn-save" onclick="saveExpense()">Save Expense</button>
    </div>
  </div>

  <!-- ── Add Expense Batch Modal ── -->
  <div class="modal" id="modal-add-expense-batch">
    <div class="modal-title">Add Expense Batch</div>
    <div class="modal-body">
      <input class="form-input modal-input" id="expense-batch-name" placeholder="Enter Batch Name:">
      <input class="form-input modal-input" id="expense-batch-date" type="date">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeExpenseModal()">Cancel</button>
      <button class="btn-save" onclick="saveExpenseBatch()">Save Batch</button>
    </div>
  </div>

</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/common.js"></script>
<script src="js/expenses.js"></script>
</body>
</html>
